<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Connexion - Bee Coders</title>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;500;600&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            height: 100vh;
            background: linear-gradient(135deg, #0f2027, #1c2b36, #2c3e50);
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
        }

        .login-container {
            background: rgba(255,255,255,0.05);
            padding: 40px;
            border-radius: 15px;
            width: 340px;
            backdrop-filter: blur(10px);
            box-shadow: 0 15px 35px rgba(0,0,0,0.5);
            text-align: center;
            animation: fadeIn 1s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        h2 {
            margin-bottom: 20px;
            font-weight: 600;
        }

        .input-group {
            position: relative;
        }

        input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: none;
            border-radius: 8px;
            outline: none;
        }

        .toggle {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            font-size: 14px;
            color: #333;
        }

        .btn {
            width: 100%;
            padding: 12px;
            background: #ffcc00;
            border: none;
            border-radius: 8px;
            font-weight: 500;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn:hover {
            background: #e6b800;
        }

        .error {
            color: #ff6b6b;
            margin-top: 10px;
            font-size: 14px;
            opacity: 0;
        }

        .error.show {
            opacity: 1;
            animation: shake 0.3s;
        }

        @keyframes shake {
            0% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            50% { transform: translateX(5px); }
            75% { transform: translateX(-5px); }
            100% { transform: translateX(0); }
        }

    </style>
</head>
<body>

    <div class="login-container">
        <h2>Connexion</h2>

        <input type="email" id="email" placeholder="Email">

        <div class="input-group">
            <input type="password" id="password" placeholder="Mot de passe">
            <span class="toggle" onclick="togglePassword()">👁</span>
        </div>

        <button class="btn" onclick="login()">Se connecter</button>

        <div id="error" class="error"></div>
    </div>

    <script>
        function togglePassword() {
            const pwd = document.getElementById("password");
            pwd.type = pwd.type === "password" ? "text" : "password";
        }

        function login() {
            const email = document.getElementById("email").value;
            const password = document.getElementById("password").value;
            const error = document.getElementById("error");

            const emailPattern = /^[^ ]+@[^ ]+\.[a-z]{2,3}$/;

            if (!emailPattern.test(email)) {
                showError("Email invalide");
                return;
            }

            if (password !== "finance26") {
                showError("Mot de passe incorrect");
                return;
            }

            
            window.location.href = "dashboard.html";
        }

        function showError(message) {
            const error = document.getElementById("error");
            error.innerText = message;
            error.classList.add("show");

            setTimeout(() => {
                error.classList.remove("show");
            }, 2000);
        }
    </script>

</body>
</html>
